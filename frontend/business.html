<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Business Loan Assessment</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Link CSS -->
  <link rel="stylesheet" href="business.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="flex">

  <!-- Back & Next Buttons -->
  <button class="nav-btn back-btn">← Back</button>
  <button class="nav-btn next-btn">Next →</button>

  <div class="app">

    <!-- Question 1 -->
    <main id="Q1" class="card">
      <h2>How many years old is your business?</h2>
      <div class="options flex">
        <input type="number" id="yearsOld" placeholder="Enter years" />
      </div>
    </main>

    <!-- Question 2 -->
    <main id="Q2" class="card hidden">
      <h2>Annual revenue (INR)?</h2>
      <div class="options flex">
        <input type="number" id="annualRevenue" placeholder="Enter amount" />
      </div>
    </main>

    <!-- Question 3 -->
    <main id="Q3" class="card hidden">
      <h2>Monthly business expenses (INR)?</h2>
      <div class="options flex">
        <input type="number" id="monthlyExpenses" placeholder="Enter amount" />
      </div>
    </main>

    <!-- Question 4 -->
    <main id="Q4" class="card hidden">
      <h2>Business owner's credit score?</h2>
      <div class="options flex">
        <input type="number" id="creditScore" placeholder="Enter credit score" />
      </div>
    </main>

    <!-- Question 5 -->
    <main id="Q5" class="card hidden">
      <h2>Existing monthly EMIs (INR)?</h2>
      <div class="options flex">
        <input type="number" id="existingEMIs" placeholder="Enter amount" />
      </div>
    </main>

  </div>

  <script>
    const cards = ["Q1","Q2","Q3","Q4","Q5"];
    let current = 0;

    const nextBtn = document.querySelector(".next-btn");
    const backBtn = document.querySelector(".back-btn");

    const showCard = index => {
      cards.forEach((id,i) => {
        document.getElementById(id).classList.toggle("hidden", i !== index);
      });

      nextBtn.textContent =
        index === cards.length - 1 ? "Submit" : "Next →";
    };

    showCard(current);

    // NEXT / SUBMIT
    nextBtn.addEventListener("click", () => {
      if (current < cards.length - 1) {
        current++;
        showCard(current);
      } else {
        submitBusinessData();
      }
    });

    // BACK
    backBtn.addEventListener("click", () => {
      if (current > 0) {
        current--;
        showCard(current);
      } else {
        window.location.href = "step1.html";
      }
    });

    // 🔥 SUBMIT (SAME FLOW AS EDUCATION)
    function submitBusinessData() {
      const payload = {
        loan_type: "Business",
        business_age: Number(document.getElementById("yearsOld").value || 0),
        annual_revenue: Number(document.getElementById("annualRevenue").value || 0),
        monthly_expenses: Number(document.getElementById("monthlyExpenses").value || 0),
        credit_score: Number(document.getElementById("creditScore").value || 0),
        existing_emis: Number(document.getElementById("existingEMIs").value || 0)
      };

      console.log("BUSINESS PAYLOAD:", payload);

      // 🔥 SAME KEY AS LOADING PAGE
      localStorage.setItem("pendingPayload", JSON.stringify(payload));

      // 🔥 GO TO LOADING
      window.location.href = "loading.html";
    }
  </script>

</body>
</html>
