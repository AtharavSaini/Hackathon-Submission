<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Medical Loan Assessment</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="medical.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Buda:wght@300&family=Gravitas+One&family=Roboto+Condensed:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="flex">

  <!-- NAV BUTTONS -->
  <button class="nav-btn back-btn">← Back</button>
  <button class="nav-btn next-btn">Next →</button>

  <div class="app">

    <!-- Q1 -->
    <main id="Q1" class="card">
      <h2>Total treatment cost (INR)?</h2>
      <div class="options flex">
        <input type="number" id="treatmentCost" placeholder="Enter amount" />
      </div>
    </main>

    <!-- Q2 -->
    <main id="Q2" class="card hidden">
      <h2>Monthly income (INR)?</h2>
      <div class="options flex">
        <input type="number" id="monthlyIncome" placeholder="Enter amount" />
      </div>
    </main>

    <!-- Q3 -->
    <main id="Q3" class="card hidden">
      <h2>Credit score?</h2>
      <div class="options flex">
        <input type="number" id="creditScore" placeholder="Enter credit score" />
      </div>
    </main>

    <!-- Q4 -->
    <main id="Q4" class="card hidden">
      <h2>Do you have health insurance?</h2>
      <div class="options flex">
        <button class="option-card flex cool" id="q4-yes">Yes</button>
        <button class="option-card flex warm" id="q4-no">No</button>
      </div>
    </main>

    <!-- Q5 -->
    <main id="Q5" class="card hidden">
      <h2>Existing EMIs (INR)?</h2>
      <div class="options flex">
        <input type="number" id="existingEMIs" placeholder="Enter amount" />
      </div>
    </main>

  </div>

  <!-- JS -->
  <script>
    // option select style
    const options = document.querySelectorAll(".option-card");
    options.forEach(option => {
      option.addEventListener("click", () => {
        options.forEach(o => o.classList.remove("selected"));
        option.classList.add("selected");
      });
    });

    const cards = ["Q1","Q2","Q3","Q4","Q5"];
    let current = 0;

    const nextBtn = document.querySelector(".next-btn");
    const backBtn = document.querySelector(".back-btn");

    const showCard = index => {
      cards.forEach((id,i) => {
        document.getElementById(id).classList.toggle("hidden", i !== index);
      });

      nextBtn.textContent = index === cards.length - 1 ? "Submit" : "Next →";
    };

    showCard(current);

    // BACK
    backBtn.addEventListener("click", () => {
      if (current > 0) {
        current--;
        showCard(current);
      } else {
        window.location.href = "step1.html";
      }
    });

    // NEXT / SUBMIT
    nextBtn.addEventListener("click", () => {
      if (current < cards.length - 1) {
        current++;
        showCard(current);
      } else {
        submitMedicalData();
      }
    });

    function submitMedicalData() {
      const payload = {
        loan_type: "Medical",
        treatment_cost: Number(document.getElementById("treatmentCost").value || 0),
        monthly_income: Number(document.getElementById("monthlyIncome").value || 0),
        credit_score: Number(document.getElementById("creditScore").value || 0),
        insurance: document.getElementById("q4-yes").classList.contains("selected") ? "Yes" : "No",
        existing_emis: Number(document.getElementById("existingEMIs").value || 0)
      };

      console.log("MEDICAL PAYLOAD:", payload);

      // 🔥 SAME GLOBAL FLOW
      localStorage.setItem("pendingPayload", JSON.stringify(payload));
      window.location.href = "loading.html";
    }
  </script>

</body>
</html>
