<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Startup Investment Result</title>
  <link rel="stylesheet" href="result_investment.css">
</head>
<body>

<div class="page">

  <!-- SCORE SECTION -->
  <section class="score-section">
    <p class="score-title">YOUR INVESTMENT SCORE</p>

    <div class="score-meter">
      <div class="meter-bg"></div>
      <div class="meter-needle"></div>
      <div class="score-value">0</div>
    </div>

    <div class="score-labels">
      <span class="poor">POOR</span>
      <span class="fair">FAIR</span>
      <span class="good">GOOD</span>
      <span class="excellent">EXCELLENT</span>
    </div>

  </section>

  <!-- INVESTMENT OPTIONS -->
  <section class="loan-section">
    <h2>Investment Opportunities</h2>
    <div id="loanList"></div>
  </section>

  <!-- ACTION BUTTONS -->
  <section class="actions">
    <button class="primary">IMPROVE INVESTMENT READINESS</button>
    <button class="secondary">Explore More Options</button>
  </section>

</div>

<script src="result_investment.js"></script>
</body>
</html>
