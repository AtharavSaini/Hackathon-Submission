<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Education Loan Result</title>

  <!-- SAME UI / SAME CSS -->
  <link rel="stylesheet" href="result_medical.css">
</head>
<body>

<div class="page">

  <!-- SCORE SECTION -->
  <section class="score-section">
    <p class="score-title">YOUR LOAN SCORE</p>

    <div class="score-meter">
      <div class="meter-bg"></div>
      <div class="meter-needle"></div>
      <div class="score-value">0</div>
    </div>

    <div class="score-labels">
      <span class="poor">POOR</span>
      <span class="fair">FAIR</span>
      <span class="good">GOOD</span>
      <span class="excellent">EXCELLENT</span>
    </div>

  </section>

  <!-- LOAN LIST -->
  <section class="loan-section">
    <h2>Education Loan Options</h2>
    <div id="loanList"></div>
  </section>

  <!-- ACTION BUTTONS -->
  <section class="actions">
    <button class="primary">BOOST MY SCORE</button>
    <button class="secondary">Find More Loans</button>
  </section>

</div>

<!-- EDUCATION JS -->
<script src="result_education.js"></script>
</body>
</html>
